# dropicture/docker-compose.local.yml
services:
  dropicture-db:
    image: postgres:18.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s

  dropicture-dragonfly:
    image: ghcr.io/dragonflydb/dragonfly:v1.38.1
    command: ["--maxmemory=512mb", "--dir=/data"]
    ulimits: { memlock: -1 }
    ports: ["6379:6379"]
    volumes:
      - dfly_data:/data

  dropicture-garage:
    image: dxflrs/garage:v2.3.0
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
    ports: ["3900:3900"]
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data

  dropicture-backend:
    image: ghcr.io/redjem-amir/dropicture/backend:${IMAGE_TAG:-latest}
    environment:
      POSTGRES_HOST: dropicture-db
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: dropicture-dragonfly
      S3_ENDPOINT: http://dropicture-garage:3900
      S3_REGION: garage
      S3_BUCKET: dropicture-media
      S3_FORCE_PATH_STYLE: "true"
      S3_ACCESS_KEY_ID: ${GARAGE_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${GARAGE_KEY_SECRET}
    ports: ["3001:3001"]
    depends_on:
      - dropicture-db
      - dropicture-dragonfly
      - dropicture-garage

  dropicture-frontend:
    image: ghcr.io/redjem-amir/dropicture/frontend:${IMAGE_TAG:-latest}
    ports: ["3000:3000"]

volumes:
  pg_data:
  dfly_data:
  garage_meta:
  garage_data: