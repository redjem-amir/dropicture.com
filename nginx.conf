# dropicture/nginx.conf
real_ip_header CF-Connecting-IP;
set_real_ip_from 0.0.0.0/0;
set_real_ip_from ::/0;

upstream dropicture_frontend {
    server dropicture-frontend:3000;
    keepalive 32;
}

upstream dropicture_backend {
    server dropicture-backend:3001;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    location = /healthz { access_log off; return 200; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name dropicture.com www.dropicture.com;
    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /run/secrets/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    client_max_body_size 100m;
    gzip on;
    gzip_types text/css application/json application/javascript image/svg+xml;
    location /api/ {
        proxy_pass http://dropicture_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
    location / {
        proxy_pass http://dropicture_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }
}