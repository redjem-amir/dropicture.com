# dropicture/docker-compose.yml
services:
  proxy:
    image: nginx:stable-alpine
    networks:
      - frontend
    ports:
      - { target: 80, published: 80, protocol: tcp, mode: host }
      - { target: 443, published: 443, protocol: tcp, mode: host }
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
      - source: origin_cert
        target: /etc/nginx/certs/origin.crt
    secrets:
      - source: origin_key
        target: origin.key
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
    deploy:
      mode: global
      update_config:
        parallelism: 1
        order: stop-first
        monitor: 15s
        failure_action: rollback
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: any
        delay: 5s
        window: 30s
      resources:
        reservations: { cpus: "0.10", memory: 64M }
        limits: { cpus: "0.50", memory: 128M }

  dropicture-frontend:
    image: ghcr.io/redjem-amir/dropicture/frontend:${IMAGE_TAG:-latest}
    networks:
      - frontend
    deploy:
      replicas: 2
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        order: start-first
        monitor: 30s
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        window: 30s
      resources:
        reservations: { cpus: "0.25", memory: 128M }
        limits: { cpus: "0.50", memory: 512M }

  dropicture-backend:
    image: ghcr.io/redjem-amir/dropicture/backend:${IMAGE_TAG:-latest}
    networks:
      - frontend
      - backend
    environment:
      POSTGRES_HOST: dropicture-db
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_HOST: dropicture-dragonfly
      S3_ENDPOINT: http://dropicture-garage:3900
      S3_REGION: garage
      S3_BUCKET: dropicture-media
      S3_FORCE_PATH_STYLE: "true"
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
    deploy:
      replicas: 2
      placement:
        preferences:
          - spread: node.id
      update_config:
        parallelism: 1
        order: start-first
        monitor: 30s
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        window: 30s
      resources:
        reservations: { cpus: "0.50", memory: 256M }
        limits: { cpus: "1.50", memory: 1G }

  dropicture-db:
    image: postgres:18.4
    networks:
      - backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - /opt/dropicture/data/postgres:/var/lib/postgresql
      - type: tmpfs
        target: /dev/shm
        tmpfs: { size: 268435456 }
    stop_grace_period: 1m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      update_config:
        parallelism: 1
        order: stop-first
        monitor: 30s
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      resources:
        reservations: { cpus: "0.50", memory: 512M }
        limits: { cpus: "2.00", memory: 2G }

  dropicture-dragonfly:
    image: ghcr.io/dragonflydb/dragonfly:v1.38.1
    command:
      - "--maxmemory=512mb"
      - "--dir=/data"
      - "--snapshot_cron=*/30 * * * *"
    ulimits:
      memlock: -1
    networks:
      - backend
    volumes:
      - /opt/dropicture/data/dragonfly:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      update_config:
        parallelism: 1
        order: stop-first
        monitor: 30s
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      resources:
        reservations: { cpus: "0.25", memory: 576M }
        limits: { cpus: "1.00", memory: 768M }

  dropicture-garage:
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    networks:
      - backend
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET is required}
      GARAGE_DEFAULT_ACCESS_KEY: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      GARAGE_DEFAULT_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      GARAGE_DEFAULT_BUCKET: dropicture-media
    configs:
      - source: garage_config
        target: /etc/garage.toml
    volumes:
      - /opt/dropicture/data/garage/meta:/var/lib/garage/meta
      - /opt/dropicture/data/garage/data:/var/lib/garage/data
    stop_grace_period: 1m
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      update_config:
        parallelism: 1
        order: stop-first
        monitor: 30s
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      resources:
        reservations: { cpus: "0.25", memory: 256M }
        limits: { cpus: "1.00", memory: 1G }

networks:
  frontend:
    driver: overlay
    driver_opts:
      com.docker.network.driver.mtu: "1400"
  backend:
    driver: overlay
    internal: true
    driver_opts:
      com.docker.network.driver.mtu: "1400"

configs:
  nginx_conf:
    file: ./nginx.conf
    name: dropicture_nginx_conf_v2
  garage_config:
    file: ./garage.toml
    name: dropicture_garage_config_v2
  origin_cert:
    external: true
    name: dropicture_origin_cert

secrets:
  origin_key:
    external: true
    name: dropicture_origin_key
