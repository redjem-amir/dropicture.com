# dropicture/.github/workflows/deploy.yml
name: Build, publish and deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "app/**"
      - "docker-compose.yml"
      - "nginx.conf"
      - "garage.toml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        component: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v7
        with:
          context: ./app/${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  deploy:
    runs-on: ubuntu-24.04
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      contents: read
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    env:
      IMAGE_TAG: sha-${{ github.sha }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      GARAGE_RPC_SECRET: ${{ secrets.GARAGE_RPC_SECRET }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve the manager IP from the Terraform state
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          MANAGER_IP=$(aws s3 cp s3://dropicture-tfstate-prod/terraform.tfstate - --region eu-west-3 \
            | jq -r '.outputs.manager_public_ip.value')
          test -n "$MANAGER_IP" && test "$MANAGER_IP" != "null"
          echo "MANAGER_IP=$MANAGER_IP" >> "$GITHUB_ENV"

      - name: Set up SSH (key in agent memory only, never on disk)
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          eval "$(ssh-agent -s)" > /dev/null
          printf '%s' "$SSH_PRIVATE_KEY_B64" | base64 -d | ssh-add -q -
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$MANAGER_IP" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy the stack
        run: |
          export DOCKER_HOST="ssh://root@$MANAGER_IP"
          docker stack deploy --detach=false --prune -c docker-compose.yml dropicture

      - name: Smoke test
        run: curl -fsSI --retry 5 --retry-delay 10 --retry-all-errors https://dropicture.com