---
# dropicture/ansible/playbook.yml
- name: Discover the server from Terraform state
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    tf_state_bucket: dropicture-tfstate-prod
    tf_state_key: terraform.tfstate
    tf_state_region: eu-west-3
  tasks:
    - name: Ensure required environment variables are set
      ansible.builtin.assert:
        that:
          - "lookup('env', 'AWS_ACCESS_KEY_ID') | length > 0"
          - "lookup('env', 'AWS_SECRET_ACCESS_KEY') | length > 0"
          - "lookup('env', 'SSH_PRIVATE_KEY_B64') | length > 0"
        fail_msg: >-
          Missing env vars. Export AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
          and SSH_PRIVATE_KEY_B64 before running this playbook.
        quiet: true

    - name: Create a temporary file for the state
      ansible.builtin.tempfile:
        state: file
        suffix: tfstate
      register: tf_state_file

    - name: Download the Terraform state from S3
      amazon.aws.s3_object:
        bucket: "{{ tf_state_bucket }}"
        object: "{{ tf_state_key }}"
        region: "{{ tf_state_region }}"
        mode: get
        dest: "{{ tf_state_file.path }}"
        overwrite: always

    - name: Parse the state
      ansible.builtin.set_fact:
        _tfstate: "{{ lookup('file', tf_state_file.path) | from_json }}"

    - name: Remove the local state copy (it can contain sensitive outputs)
      ansible.builtin.file:
        path: "{{ tf_state_file.path }}"
        state: absent

    - name: Extract the server address from the outputs
      ansible.builtin.set_fact:
        _server_public_ip: "{{ _tfstate.outputs.manager_public_ip.value }}"

    - name: Extract the Origin CA certificate and key from the outputs
      ansible.builtin.set_fact:
        _origin_cert: "{{ _tfstate.outputs.origin_cert_pem.value }}"
        _origin_key: "{{ _tfstate.outputs.origin_key_pem.value }}"
      no_log: true

    - name: Sanity check on the outputs
      ansible.builtin.assert:
        that:
          - "_server_public_ip | length > 0"
        fail_msg: "manager_public_ip is missing from the Terraform state."
        quiet: true

    - name: Materialise the SSH private key
      ansible.builtin.tempfile:
        state: file
        suffix: ssh_key
      register: ssh_key

    - name: Write the SSH private key (0600)
      ansible.builtin.copy:
        dest: "{{ ssh_key.path }}"
        content: "{{ lookup('env', 'SSH_PRIVATE_KEY_B64') | b64decode }}"
        mode: "0600"

    - name: Register the Swarm server
      ansible.builtin.add_host:
        name: "{{ _server_public_ip }}"
        groups: [swarm]
        ansible_host: "{{ _server_public_ip }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ ssh_key.path }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
        node_public_ip: "{{ _server_public_ip }}"

- name: Provision Docker Engine on the server
  hosts: swarm
  gather_facts: true
  vars:
    dropicture_tls_dir: /opt/dropicture/tls
    dropicture_data_dir: /opt/dropicture/data
  handlers:
    - name: Restart docker
      ansible.builtin.service:
        name: docker
        state: restarted

    - name: Restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted
  tasks:
    - name: Harden SSH (port 22 is world-open, so enforce key-only auth)
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/10-dropicture-hardening.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          PermitRootLogin prohibit-password
          MaxAuthTries 3
      notify: Restart ssh

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure the apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add the Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add the Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker Engine (CE) and the Python SDK for the Ansible modules
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          - python3-docker
          - python3-jsondiff
          - python3-yaml
        state: present
        update_cache: true

    - name: Deploy the Docker daemon configuration (log rotation)
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
        validate: "dockerd --validate --config-file %s"
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
      notify: Restart docker

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Load the bridge kernel modules now and at boot
      community.general.modprobe:
        name: "{{ item }}"
        state: present
        persistent: present
      loop:
        - bridge
        - br_netfilter

    - name: Configure sysctls for bridged container traffic
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-docker.conf
        sysctl_set: true
        reload: true
      loop:
        - name: net.bridge.bridge-nf-call-iptables
          value: "1"
        - name: net.bridge.bridge-nf-call-ip6tables
          value: "1"
        - name: net.ipv4.ip_forward
          value: "1"

    - name: Check whether the data path is still the old volume symlink
      ansible.builtin.stat:
        path: "{{ dropicture_data_dir }}"
      register: _data_stat

    - name: Refuse to continue if the old Hetzner volume symlink is in place
      ansible.builtin.assert:
        that:
          - not (_data_stat.stat.islnk | default(false))
        fail_msg: >-
          {{ dropicture_data_dir }} is still a symlink to the old Hetzner
          volume. Migrate the data to the local disk and remove the link
          before re-running this playbook.
        quiet: true

    - name: Create the data directory on the local disk
      ansible.builtin.file:
        path: "{{ dropicture_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Create the per-service data directories
      ansible.builtin.file:
        path: "{{ dropicture_data_dir }}/{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      loop:
        - postgres
        - dragonfly
        - garage/meta
        - garage/data

    - name: Apply any pending Docker restart before touching the Swarm
      ansible.builtin.meta: flush_handlers

- name: Initialise the single-node Swarm
  hosts: swarm
  gather_facts: false
  vars:
    swarm_default_addr_pool: ["10.100.0.0/16"]
    swarm_subnet_size: 24
  tasks:
    - name: Init the Swarm (the server is its own manager, no joins)
      community.docker.docker_swarm:
        state: present
        advertise_addr: "{{ node_public_ip }}"
        listen_addr: "{{ node_public_ip }}:2377"
        default_addr_pool: "{{ swarm_default_addr_pool }}"
        subnet_size: "{{ swarm_subnet_size }}"

- name: Configure the Swarm (configs, secrets)
  hosts: swarm
  gather_facts: false
  vars:
    stacks_dir: /opt/dropicture/stacks
  tasks:
    - name: Store the Origin CA certificate as a Swarm config
      community.docker.docker_config:
        name: dropicture_origin_cert
        data: "{{ hostvars['localhost']._origin_cert | b64encode }}"
        data_is_b64: true
        state: present

    - name: Store the Origin CA private key as a Swarm secret
      community.docker.docker_secret:
        name: dropicture_origin_key
        data: "{{ hostvars['localhost']._origin_key | b64encode }}"
        data_is_b64: true
        state: present
      no_log: true

    - name: Store the Traefik dynamic TLS configuration as a Swarm config
      community.docker.docker_config:
        name: dropicture_traefik_dynamic_v1
        data: |
          tls:
            stores:
              default:
                defaultCertificate:
                  certFile: /etc/traefik/certs/origin.crt
                  keyFile: /run/secrets/origin.key
            certificates:
              - certFile: /etc/traefik/certs/origin.crt
                keyFile: /run/secrets/origin.key
        state: present

    - name: Ensure the stacks directory exists (drop your app stack files here)
      ansible.builtin.file:
        path: "{{ stacks_dir }}"
        state: directory
        mode: "0750"

- name: Clean up
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Remove the temporary SSH key
      ansible.builtin.file:
        path: "{{ hostvars['localhost'].ssh_key.path }}"
        state: absent
      when: hostvars['localhost'].ssh_key is defined