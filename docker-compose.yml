# dropicture/docker-compose.yml
services:
  proxy:
    image: nginx:stable-alpine
    networks:
      - frontend
    ports:
      - { target: 80, published: 80, protocol: tcp, mode: host }
      - { target: 443, published: 443, protocol: tcp, mode: host }
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
      - source: origin_cert
        target: /etc/nginx/certs/origin.crt
    secrets:
      - source: origin_key
        target: origin.key
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
    deploy:
      mode: global
      update_config:
        parallelism: 1
        order: stop-first
        monitor: 15s
        failure_action: rollback
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: any
        delay: 5s
        window: 30s
      resources:
        reservations: { cpus: "0.10", memory: 64M }
        limits: { cpus: "0.50", memory: 128M }

  dropicture-frontend:
    image: ghcr.io/redjem-amir/dropicture/frontend:${IMAGE_TAG:-latest}
    networks:
      - frontend
    environment:
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL:?NEXT_PUBLIC_URL is required}
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        monitor: 30s
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        window: 30s
      resources:
        reservations: { cpus: "0.25", memory: 128M }
        limits: { cpus: "1.00", memory: 512M }

  dropicture-backend:
    image: ghcr.io/redjem-amir/dropicture/backend:${IMAGE_TAG:-latest}
    networks:
      - frontend
      - backend
    environment:
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:?DEFAULT_ADMIN_EMAIL is required}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?DEFAULT_ADMIN_PASSWORD is required}
      POSTGRES_HOST: dropicture-pgbouncer
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_HOST: dropicture-dragonfly
      S3_ENDPOINT: http://dropicture-garage:3900
      S3_REGION: garage
      S3_BUCKET: dropicture-media
      S3_FORCE_PATH_STYLE: "true"
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        monitor: 30s
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        window: 30s
      resources:
        reservations: { cpus: "0.50", memory: 512M }
        limits: { cpus: "2.00", memory: 2G }

  dropicture-pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    networks:
      - backend
    environment:
      DB_HOST: dropicture-db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:?POSTGRES_DB is required}
      DB_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      RESERVE_POOL_TIMEOUT: "3"
      MAX_CLIENT_CONN: "1000"
      MAX_PREPARED_STATEMENTS: "200"
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        monitor: 30s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        window: 30s
      resources:
        reservations: { cpus: "0.10", memory: 32M }
        limits: { cpus: "0.50", memory: 128M }

  dropicture-db:
    image: postgres:18.4
    networks:
      - backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    command:
      - "postgres"
      - "-c"
      - "max_connections=80"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
    volumes:
      - /opt/dropicture/data/postgres:/var/lib/postgresql
      - type: tmpfs
        target: /dev/shm
        tmpfs: { size: 1073741824 }
    stop_grace_period: 1m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
        monitor: 30s
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      resources:
        reservations: { cpus: "1.00", memory: 1G }
        limits: { cpus: "3.00", memory: 4G }

  dropicture-dragonfly:
    image: ghcr.io/dragonflydb/dragonfly:v1.38.1
    command:
      - "--maxmemory=1gb"
      - "--dir=/data"
      - "--snapshot_cron=*/30 * * * *"
    ulimits:
      memlock: -1
    networks:
      - backend
    volumes:
      - /opt/dropicture/data/dragonfly:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
        monitor: 30s
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      resources:
        reservations: { cpus: "0.50", memory: 1152M }
        limits: { cpus: "1.00", memory: 1536M }

  dropicture-garage:
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    networks:
      - backend
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET is required}
      GARAGE_DEFAULT_ACCESS_KEY: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      GARAGE_DEFAULT_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      GARAGE_DEFAULT_BUCKET: dropicture-media
    configs:
      - source: garage_config
        target: /etc/garage.toml
    volumes:
      - /opt/dropicture/data/garage/meta:/var/lib/garage/meta
      - /opt/dropicture/data/garage/data:/var/lib/garage/data
    stop_grace_period: 1m
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
        monitor: 30s
      restart_policy:
        condition: any
        delay: 5s
        window: 60s
      resources:
        reservations: { cpus: "0.50", memory: 512M }
        limits: { cpus: "1.50", memory: 2G }

networks:
  frontend:
    driver: overlay
  backend:
    driver: overlay
    internal: true

configs:
  nginx_conf:
    file: ./nginx.conf
    name: dropicture_nginx_conf_v2
  garage_config:
    file: ./garage.toml
    name: dropicture_garage_config_v2
  origin_cert:
    external: true
    name: dropicture_origin_cert

secrets:
  origin_key:
    external: true
    name: dropicture_origin_key
