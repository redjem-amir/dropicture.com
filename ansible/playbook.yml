---
# dropicture/ansible/playbook.yml
- name: Discover nodes from Terraform state
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    tf_state_bucket: dropicture-tfstate-prod
    tf_state_key: terraform.tfstate
    tf_state_region: eu-west-3
  tasks:
    - name: Ensure required environment variables are set
      ansible.builtin.assert:
        that:
          - "lookup('env', 'AWS_ACCESS_KEY_ID') | length > 0"
          - "lookup('env', 'AWS_SECRET_ACCESS_KEY') | length > 0"
          - "lookup('env', 'SSH_PRIVATE_KEY_B64') | length > 0"
        fail_msg: >-
          Missing env vars. Export AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
          and SSH_PRIVATE_KEY_B64 before running this playbook.
        quiet: true

    - name: Create a temporary file for the state
      ansible.builtin.tempfile:
        state: file
        suffix: tfstate
      register: tf_state_file

    - name: Download the Terraform state from S3
      amazon.aws.s3_object:
        bucket: "{{ tf_state_bucket }}"
        object: "{{ tf_state_key }}"
        region: "{{ tf_state_region }}"
        mode: get
        dest: "{{ tf_state_file.path }}"
        overwrite: always

    - name: Parse the state
      ansible.builtin.set_fact:
        _tfstate: "{{ lookup('file', tf_state_file.path) | from_json }}"

    - name: Remove the local state copy (it can contain sensitive outputs)
      ansible.builtin.file:
        path: "{{ tf_state_file.path }}"
        state: absent

    - name: Extract the server and client addresses from the outputs
      ansible.builtin.set_fact:
        _server_public_ips: "{{ _tfstate.outputs.server_public_ips.value }}"
        _server_private_ips: "{{ _tfstate.outputs.server_private_ips.value }}"
        _client_public_ips: "{{ _tfstate.outputs.client_public_ips.value }}"
        _client_private_ips: "{{ _tfstate.outputs.client_private_ips.value }}"

    - name: Extract the Origin CA certificate and key from the outputs
      ansible.builtin.set_fact:
        _origin_cert: "{{ _tfstate.outputs.origin_cert_pem.value }}"
        _origin_key: "{{ _tfstate.outputs.origin_key_pem.value }}"
      no_log: true

    - name: Compute the full private address set
      ansible.builtin.set_fact:
        _all_private_ips: "{{ _server_private_ips + _client_private_ips }}"

    - name: Sanity check on the outputs
      ansible.builtin.assert:
        that:
          - "_server_public_ips | length > 0"
          - "_server_public_ips | length == (_server_private_ips | length)"
          - "_client_public_ips | length == (_client_private_ips | length)"
        fail_msg: "server_/client_ public and private IP lists are missing or misaligned in the state."
        quiet: true

    - name: Materialise the SSH private key
      ansible.builtin.tempfile:
        state: file
        suffix: ssh_key
      register: ssh_key

    - name: Write the SSH private key (0600)
      ansible.builtin.copy:
        dest: "{{ ssh_key.path }}"
        content: "{{ lookup('env', 'SSH_PRIVATE_KEY_B64') | b64decode }}"
        mode: "0600"

    - name: Register the Nomad servers
      ansible.builtin.add_host:
        name: "{{ item.0 }}"
        groups: [nomad, nomad_servers]
        ansible_host: "{{ item.0 }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ ssh_key.path }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
        node_private_ip: "{{ item.1 }}"
        nomad_role: server
      loop: "{{ _server_public_ips | zip(_server_private_ips) | list }}"
      loop_control:
        label: "server {{ item.0 }} (private {{ item.1 }})"

    - name: Register the Nomad clients
      ansible.builtin.add_host:
        name: "{{ item.0 }}"
        groups: [nomad, nomad_clients]
        ansible_host: "{{ item.0 }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ ssh_key.path }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
        node_private_ip: "{{ item.1 }}"
        nomad_role: client
      loop: "{{ _client_public_ips | zip(_client_private_ips) | list }}"
      loop_control:
        label: "client {{ item.0 }} (private {{ item.1 }})"

- name: Configure the Nomad cluster
  hosts: nomad
  gather_facts: true
  vars:
    nomad_datacenter: dc1
    nomad_region: global
    nomad_data_dir: /opt/nomad/data
    nomad_config_dir: /etc/nomad.d
    nomad_bind_addr: "0.0.0.0"
    nomad_version: "2.0.2-1"
    cni_plugins_version: "1.6.2"
    cni_plugins_baseurl: "https://github.com/containernetworking/plugins/releases/download"
    dropicture_tls_dir: /opt/dropicture/tls
  handlers:
    - name: Restart nomad
      ansible.builtin.service:
        name: nomad
        state: restarted
  tasks:
    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - gnupg
          - curl
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure the apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add the HashiCorp GPG key
      ansible.builtin.get_url:
        url: https://apt.releases.hashicorp.com/gpg
        dest: /etc/apt/keyrings/hashicorp.asc
        mode: "0644"

    - name: Add the HashiCorp apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/hashicorp.asc] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
        filename: hashicorp
        state: present

    - name: Install Nomad
      ansible.builtin.apt:
        name: "nomad{{ ('=' + nomad_version) if nomad_version | length > 0 else '' }}"
        state: "{{ 'present' if nomad_version | length > 0 else 'latest' }}"
        update_cache: true

    - name: Install Docker (Nomad docker driver)
      ansible.builtin.apt:
        name: docker.io
        state: present
        update_cache: true
      notify: Restart nomad

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Ensure the CNI plugins directory exists
      ansible.builtin.file:
        path: /opt/cni/bin
        state: directory
        mode: "0755"

    - name: Install the CNI reference plugins
      ansible.builtin.unarchive:
        src: "{{ cni_plugins_baseurl }}/v{{ cni_plugins_version }}/cni-plugins-linux-amd64-v{{ cni_plugins_version }}.tgz"
        dest: /opt/cni/bin
        remote_src: true
        creates: /opt/cni/bin/bridge
      notify: Restart nomad

    - name: Load the bridge kernel modules now and at boot
      community.general.modprobe:
        name: "{{ item }}"
        state: present
        persistent: present
      loop:
        - bridge
        - br_netfilter

    - name: Configure sysctls for bridged container traffic
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-nomad.conf
        sysctl_set: true
        reload: true
      loop:
        - name: net.bridge.bridge-nf-call-iptables
          value: "1"
        - name: net.bridge.bridge-nf-call-ip6tables
          value: "1"
        - name: net.ipv4.ip_forward
          value: "1"

    - name: Ensure the data directory exists
      ansible.builtin.file:
        path: "{{ nomad_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Locate the Hetzner media volume mountpoint
      ansible.builtin.set_fact:
        media_mount: "{{ ansible_mounts | map(attribute='mount') | select('match', '^/mnt/HC_Volume_') | list | first | default('') }}"

    - name: Ensure the media volume is mounted
      ansible.builtin.assert:
        that:
          - media_mount | length > 0
        fail_msg: "No /mnt/HC_Volume_* mountpoint found on {{ inventory_hostname }} — is the Hetzner volume attached and automounted?"
        quiet: true

    - name: Create the data directories on the media volume
      ansible.builtin.file:
        path: "{{ media_mount }}/{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      loop:
        - postgres
        - dragonfly

    - name: Ensure the TLS directory exists
      ansible.builtin.file:
        path: "{{ dropicture_tls_dir }}"
        state: directory
        mode: "0750"

    - name: Write the Origin CA certificate
      ansible.builtin.copy:
        dest: "{{ dropicture_tls_dir }}/origin.crt"
        content: "{{ hostvars['localhost']._origin_cert }}"
        mode: "0644"

    - name: Write the Origin CA private key
      ansible.builtin.copy:
        dest: "{{ dropicture_tls_dir }}/origin.key"
        content: "{{ hostvars['localhost']._origin_key }}"
        mode: "0600"
      no_log: true

    - name: Deploy the Nomad configuration
      ansible.builtin.copy:
        dest: "{{ nomad_config_dir }}/nomad.hcl"
        owner: root
        group: root
        mode: "0640"
        validate: "nomad config validate %s"
        content: |

          name       = "{{ node_private_ip }}"
          data_dir   = "{{ nomad_data_dir }}"
          datacenter = "{{ nomad_datacenter }}"
          region     = "{{ nomad_region }}"
          bind_addr  = "{{ nomad_bind_addr }}"

          advertise {
            http = "{{ ansible_host }}"
            rpc  = "{{ node_private_ip }}"
            serf = "{{ node_private_ip }}"
          }

          server {
          {% if nomad_role == 'server' %}
            enabled          = true
            bootstrap_expect = {{ groups['nomad_servers'] | length }}
            server_join {
              retry_join = [{% for h in groups['nomad_servers'] %}"{{ hostvars[h].node_private_ip }}"{% if not loop.last %}, {% endif %}{% endfor %}]
            }
          {% else %}
            enabled = false
          {% endif %}
          }

          client {
            enabled = true
            servers = [{% for h in groups['nomad_servers'] %}"{{ hostvars[h].node_private_ip }}:4647"{% if not loop.last %}, {% endif %}{% endfor %}]

            host_volume "postgres-data" {
              path = "{{ media_mount }}/postgres"
            }

            host_volume "dragonfly-data" {
              path = "{{ media_mount }}/dragonfly"
            }

            host_volume "tls-origin" {
              path      = "{{ dropicture_tls_dir }}"
              read_only = true
            }
          }

          acl {
            enabled = true
          }

          ui {
            enabled = false
          }
      notify: Restart nomad

    - name: Enable and start Nomad
      ansible.builtin.service:
        name: nomad
        state: started
        enabled: true

- name: Bootstrap Nomad ACL and store the token in AWS Secrets Manager
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    project_name: dropicture
    aws_region: eu-west-3
    nomad_secret_name: "nomad/{{ project_name }}/management-token"
  tasks:
    - name: Resolve a server API endpoint (first server node)
      ansible.builtin.set_fact:
        nomad_api: "http://{{ _server_public_ips[0] }}:4646"

    - name: Check whether the secret already exists
      ansible.builtin.set_fact:
        _existing_secret: "{{ query('amazon.aws.aws_secret', nomad_secret_name, on_missing='skip', region=aws_region) }}"

    - name: Bootstrap the ACL system on first run only
      when: _existing_secret | length == 0
      block:
        - name: Wait for the Nomad HTTP API to accept connections
          ansible.builtin.wait_for:
            host: "{{ _server_public_ips[0] }}"
            port: 4646
            timeout: 120

        - name: Bootstrap the ACL system
          ansible.builtin.uri:
            url: "{{ nomad_api }}/v1/acl/bootstrap"
            method: POST
            status_code: 200
          register: _acl_bootstrap
          retries: 10
          delay: 6
          until: _acl_bootstrap.status == 200

        - name: Store the management token in AWS Secrets Manager
          community.aws.secretsmanager_secret:
            name: "{{ nomad_secret_name }}"
            state: present
            secret_type: string
            secret: "{{ _acl_bootstrap.json.SecretID }}"
            description: "Nomad ACL management token for {{ project_name }}"
            region: "{{ aws_region }}"
            tags:
              Project: "{{ project_name }}"
              Component: nomad-acl
              ManagedBy: ansible

- name: Reconcile the Nomad cluster with the Terraform inventory
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    project_name: dropicture
    aws_region: eu-west-3
    nomad_secret_name: "nomad/{{ project_name }}/management-token"
  tasks:
    - name: Resolve a server API endpoint (first server node)
      ansible.builtin.set_fact:
        nomad_api: "http://{{ _server_public_ips[0] }}:4646"

    - name: Fetch the management token from Secrets Manager
      ansible.builtin.set_fact:
        _mgmt_token: "{{ lookup('amazon.aws.aws_secret', nomad_secret_name, region=aws_region) }}"
      no_log: true

    - name: List the current Nomad server members
      ansible.builtin.uri:
        url: "{{ nomad_api }}/v1/agent/members"
        method: GET
        headers:
          X-Nomad-Token: "{{ _mgmt_token }}"
        status_code: 200
      register: _members

    - name: Force-leave and prune servers no longer in the Terraform state
      ansible.builtin.uri:
        url: "{{ nomad_api }}/v1/agent/force-leave?node={{ item.Name | urlencode }}&prune=true"
        method: POST
        headers:
          X-Nomad-Token: "{{ _mgmt_token }}"
        status_code: 200
      loop: "{{ _members.json.Members | rejectattr('Addr', 'in', _server_private_ips) | list }}"
      loop_control:
        label: "{{ item.Name }} ({{ item.Addr }})"

    - name: List the current Nomad client nodes
      ansible.builtin.uri:
        url: "{{ nomad_api }}/v1/nodes"
        method: GET
        headers:
          X-Nomad-Token: "{{ _mgmt_token }}"
        status_code: 200
      register: _nodes

    - name: Purge client nodes no longer in the Terraform state
      ansible.builtin.uri:
        url: "{{ nomad_api }}/v1/node/{{ item.ID }}/purge"
        method: POST
        headers:
          X-Nomad-Token: "{{ _mgmt_token }}"
        status_code: 200
      loop: "{{ _nodes.json | rejectattr('Name', 'in', _all_private_ips) | list }}"
      loop_control:
        label: "{{ item.Name }} ({{ item.ID }})"

- name: Clean up
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Remove the temporary SSH key
      ansible.builtin.file:
        path: "{{ hostvars['localhost'].ssh_key.path }}"
        state: absent
      when: hostvars['localhost'].ssh_key is defined