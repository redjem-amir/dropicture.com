# dropicture/docker-compose.local.yml
services:
  dropicture-db:
    image: postgres:18.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dropicture-pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    depends_on:
      dropicture-db:
        condition: service_healthy
    environment:
      DB_HOST: dropicture-db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "10"
      MIN_POOL_SIZE: "1"
      RESERVE_POOL_SIZE: "2"
      RESERVE_POOL_TIMEOUT: "3"
      MAX_CLIENT_CONN: "100"
      MAX_PREPARED_STATEMENTS: "200"
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dropicture-dragonfly:
    image: ghcr.io/dragonflydb/dragonfly:v1.38.1
    command: ["--maxmemory=512mb", "--dir=/data"]
    ulimits: { memlock: -1 }
    ports: ["6379:6379"]
    volumes:
      - dfly_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dropicture-garage:
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:?GARAGE_RPC_SECRET is required}
      GARAGE_DEFAULT_ACCESS_KEY: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      GARAGE_DEFAULT_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
      GARAGE_DEFAULT_BUCKET: ${S3_BUCKET:-dropicture-media}
    ports: ["3900:3900"]
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data

  dropicture-backend:
    image: ghcr.io/redjem-amir/dropicture/backend:${IMAGE_TAG:-latest}
    environment:
      POSTGRES_HOST: dropicture-pgbouncer
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: dropicture-dragonfly
      S3_ENDPOINT: http://dropicture-garage:3900
      S3_REGION: garage
      S3_BUCKET: ${S3_BUCKET:-dropicture-media}
      S3_FORCE_PATH_STYLE: "true"
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    ports: ["3001:3001"]
    depends_on:
      dropicture-pgbouncer:
        condition: service_healthy
      dropicture-dragonfly:
        condition: service_healthy
      dropicture-garage:
        condition: service_started

  dropicture-frontend:
    image: ghcr.io/redjem-amir/dropicture/frontend:${IMAGE_TAG:-latest}
    ports: ["3000:3000"]
    depends_on:
      - dropicture-backend

volumes:
  pg_data:
  dfly_data:
  garage_meta:
  garage_data: