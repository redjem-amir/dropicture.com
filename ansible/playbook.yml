---
# dropicture/ansible/playbook.yml
- name: Discover nodes from Terraform state
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    tf_state_bucket: dropicture-tfstate-prod
    tf_state_key: terraform.tfstate
    tf_state_region: eu-west-3
  tasks:
    - name: Ensure required environment variables are set
      ansible.builtin.assert:
        that:
          - "lookup('env', 'AWS_ACCESS_KEY_ID') | length > 0"
          - "lookup('env', 'AWS_SECRET_ACCESS_KEY') | length > 0"
          - "lookup('env', 'SSH_PRIVATE_KEY_B64') | length > 0"
        fail_msg: >-
          Missing env vars. Export AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
          and SSH_PRIVATE_KEY_B64 before running this playbook.
        quiet: true

    - name: Create a temporary file for the state
      ansible.builtin.tempfile:
        state: file
        suffix: tfstate
      register: tf_state_file

    - name: Download the Terraform state from S3
      amazon.aws.s3_object:
        bucket: "{{ tf_state_bucket }}"
        object: "{{ tf_state_key }}"
        region: "{{ tf_state_region }}"
        mode: get
        dest: "{{ tf_state_file.path }}"
        overwrite: always

    - name: Parse the state
      ansible.builtin.set_fact:
        _tfstate: "{{ lookup('file', tf_state_file.path) | from_json }}"

    - name: Remove the local state copy (it can contain sensitive outputs)
      ansible.builtin.file:
        path: "{{ tf_state_file.path }}"
        state: absent

    - name: Extract the manager and worker addresses from the outputs
      ansible.builtin.set_fact:
        _manager_public_ips: "{{ _tfstate.outputs.manager_public_ips.value }}"
        _manager_private_ips: "{{ _tfstate.outputs.manager_private_ips.value }}"
        _worker_public_ips: "{{ _tfstate.outputs.worker_public_ips.value }}"
        _worker_private_ips: "{{ _tfstate.outputs.worker_private_ips.value }}"

    - name: Extract the Origin CA certificate and key from the outputs
      ansible.builtin.set_fact:
        _origin_cert: "{{ _tfstate.outputs.origin_cert_pem.value }}"
        _origin_key: "{{ _tfstate.outputs.origin_key_pem.value }}"
      no_log: true

    - name: Compute the full private address set
      ansible.builtin.set_fact:
        _all_private_ips: "{{ _manager_private_ips + _worker_private_ips }}"

    - name: Sanity check on the outputs
      ansible.builtin.assert:
        that:
          - "_manager_public_ips | length > 0"
          - "_manager_public_ips | length == (_manager_private_ips | length)"
          - "_worker_public_ips | length == (_worker_private_ips | length)"
        fail_msg: "manager_/worker_ public and private IP lists are missing or misaligned in the state."
        quiet: true

    - name: Materialise the SSH private key
      ansible.builtin.tempfile:
        state: file
        suffix: ssh_key
      register: ssh_key

    - name: Write the SSH private key (0600)
      ansible.builtin.copy:
        dest: "{{ ssh_key.path }}"
        content: "{{ lookup('env', 'SSH_PRIVATE_KEY_B64') | b64decode }}"
        mode: "0600"

    - name: Register the Swarm managers
      ansible.builtin.add_host:
        name: "{{ item.0 }}"
        groups: [swarm, swarm_managers]
        ansible_host: "{{ item.0 }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ ssh_key.path }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
        node_private_ip: "{{ item.1 }}"
      loop: "{{ _manager_public_ips | zip(_manager_private_ips) | list }}"
      loop_control:
        label: "manager {{ item.0 }} (private {{ item.1 }})"

    - name: Register the Swarm workers
      ansible.builtin.add_host:
        name: "{{ item.0 }}"
        groups: [swarm, swarm_workers]
        ansible_host: "{{ item.0 }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ ssh_key.path }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
        node_private_ip: "{{ item.1 }}"
      loop: "{{ _worker_public_ips | zip(_worker_private_ips) | list }}"
      loop_control:
        label: "worker {{ item.0 }} (private {{ item.1 }})"

- name: Provision Docker Engine on every node
  hosts: swarm
  gather_facts: true
  vars:
    dropicture_tls_dir: /opt/dropicture/tls
    dropicture_data_link: /opt/dropicture/data
  handlers:
    - name: Restart docker
      ansible.builtin.service:
        name: docker
        state: restarted

    - name: Restart ssh
      ansible.builtin.service:
        name: ssh
        state: restarted
  tasks:
    - name: Harden SSH (port 22 is world-open, so enforce key-only auth)
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/10-dropicture-hardening.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          PermitRootLogin prohibit-password
          MaxAuthTries 3
      notify: Restart ssh

    - name: Install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Ensure the apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add the Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add the Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: Install Docker Engine (CE) and the Python SDK for the Ansible modules
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          - python3-docker
          - python3-jsondiff
          - python3-yaml
        state: present
        update_cache: true

    - name: Deploy the Docker daemon configuration (log rotation)
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        owner: root
        group: root
        mode: "0644"
        validate: "dockerd --validate --config-file %s"
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
      notify: Restart docker

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Load the bridge kernel modules now and at boot
      community.general.modprobe:
        name: "{{ item }}"
        state: present
        persistent: present
      loop:
        - bridge
        - br_netfilter

    - name: Configure sysctls for bridged container traffic
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/99-docker.conf
        sysctl_set: true
        reload: true
      loop:
        - name: net.bridge.bridge-nf-call-iptables
          value: "1"
        - name: net.bridge.bridge-nf-call-ip6tables
          value: "1"
        - name: net.ipv4.ip_forward
          value: "1"

    - name: Locate the Hetzner media volume mountpoint
      ansible.builtin.set_fact:
        media_mount: "{{ ansible_mounts | map(attribute='mount') | select('match', '^/mnt/HC_Volume_') | list | first | default('') }}"

    - name: Ensure the media volume is mounted
      ansible.builtin.assert:
        that:
          - media_mount | length > 0
        fail_msg: "No /mnt/HC_Volume_* mountpoint found on {{ inventory_hostname }} — is the Hetzner volume attached and automounted?"
        quiet: true

    - name: Create the data directories on the media volume
      ansible.builtin.file:
        path: "{{ media_mount }}/{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      loop:
        - postgres
        - dragonfly
        - garage/meta
        - garage/data

    - name: Expose the media volume under a stable path (for identical bind mounts on every node)
      ansible.builtin.file:
        src: "{{ media_mount }}"
        dest: "{{ dropicture_data_link }}"
        state: link

    - name: Ensure the TLS directory exists
      ansible.builtin.file:
        path: "{{ dropicture_tls_dir }}"
        state: directory
        mode: "0750"

    - name: Write the Origin CA certificate
      ansible.builtin.copy:
        dest: "{{ dropicture_tls_dir }}/origin.crt"
        content: "{{ hostvars['localhost']._origin_cert }}"
        mode: "0644"

    - name: Write the Origin CA private key
      ansible.builtin.copy:
        dest: "{{ dropicture_tls_dir }}/origin.key"
        content: "{{ hostvars['localhost']._origin_key }}"
        mode: "0600"
      no_log: true

    - name: Apply any pending Docker restart before touching the Swarm
      ansible.builtin.meta: flush_handlers

- name: Initialise the Swarm on the first manager
  hosts: swarm_managers[0]
  gather_facts: false
  vars:
    swarm_default_addr_pool: ["10.100.0.0/16"]
    swarm_subnet_size: 24
  tasks:
    - name: Init the Swarm (control plane bound to the private network)
      community.docker.docker_swarm:
        state: present
        advertise_addr: "{{ node_private_ip }}"
        listen_addr: "{{ node_private_ip }}:2377"
        default_addr_pool: "{{ swarm_default_addr_pool }}"
        subnet_size: "{{ swarm_subnet_size }}"

    - name: Check the ingress network MTU
      ansible.builtin.shell: >-
        docker network inspect ingress
        | grep -q '"com.docker.network.driver.mtu": "1400"'
      register: _ingress_mtu
      changed_when: false
      failed_when: _ingress_mtu.rc not in [0, 1]

    - name: Recreate the ingress network with MTU 1400
      ansible.builtin.shell: |
        set -e
        printf 'y\n' | docker network rm ingress
        sleep 5
        docker network create \
          --driver overlay \
          --ingress \
          --opt com.docker.network.driver.mtu=1400 \
          ingress
      when: _ingress_mtu.rc != 0

    - name: Read the Swarm join tokens
      community.docker.docker_swarm_info:
      register: _swarm_info

    - name: Publish the join tokens as facts
      ansible.builtin.set_fact:
        swarm_manager_token: "{{ _swarm_info.swarm_facts.JoinTokens.Manager }}"
        swarm_worker_token: "{{ _swarm_info.swarm_facts.JoinTokens.Worker }}"
      no_log: true

- name: Join the remaining managers
  hosts: swarm_managers
  gather_facts: false
  tasks:
    - name: Join the Swarm as a manager
      community.docker.docker_swarm:
        state: join
        advertise_addr: "{{ node_private_ip }}"
        listen_addr: "{{ node_private_ip }}:2377"
        join_token: "{{ hostvars[groups['swarm_managers'][0]].swarm_manager_token }}"
        remote_addrs:
          ["{{ hostvars[groups['swarm_managers'][0]].node_private_ip }}:2377"]
      when: inventory_hostname != groups['swarm_managers'][0]

- name: Join the workers
  hosts: swarm_workers
  gather_facts: false
  tasks:
    - name: Join the Swarm as a worker
      community.docker.docker_swarm:
        state: join
        advertise_addr: "{{ node_private_ip }}"
        join_token: "{{ hostvars[groups['swarm_managers'][0]].swarm_worker_token }}"
        remote_addrs:
          ["{{ hostvars[groups['swarm_managers'][0]].node_private_ip }}:2377"]

- name: Configure the cluster (secrets, reconciliation)
  hosts: swarm_managers[0]
  gather_facts: false
  vars:
    stacks_dir: /opt/dropicture/stacks
  tasks:
    - name: Store the Origin CA certificate as a Swarm config
      community.docker.docker_config:
        name: dropicture_origin_cert
        data: "{{ hostvars['localhost']._origin_cert | b64encode }}"
        data_is_b64: true
        state: present

    - name: Store the Origin CA private key as a Swarm secret
      community.docker.docker_secret:
        name: dropicture_origin_key
        data: "{{ hostvars['localhost']._origin_key | b64encode }}"
        data_is_b64: true
        state: present
      no_log: true

    - name: Ensure the stacks directory exists (drop your app stack files here)
      ansible.builtin.file:
        path: "{{ stacks_dir }}"
        state: directory
        mode: "0750"

    - name: Snapshot the Swarm node list
      community.docker.docker_swarm_info:
        nodes: true
        verbose_output: true
      register: _swarm_nodes

    - name: Remove nodes that are no longer in the Terraform state
      ansible.builtin.shell: |
        set -e
        docker node demote {{ item.ID }} 2>/dev/null || true
        docker node rm --force {{ item.ID }}
      loop: "{{ _swarm_nodes.nodes | rejectattr('Status.Addr', 'in', hostvars['localhost']._all_private_ips) | list }}"
      loop_control:
        label: "{{ item.Description.Hostname }} ({{ item.Status.Addr }})"

- name: Clean up
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Remove the temporary SSH key
      ansible.builtin.file:
        path: "{{ hostvars['localhost'].ssh_key.path }}"
        state: absent
      when: hostvars['localhost'].ssh_key is defined
